deploy:
  stage: deploy
  image: alpine:latest

  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - printf "%s\n" "$SSH_PRIVATE_KEY" > ~/.ssh/gitlab_deploy
    - chmod 600 ~/.ssh/gitlab_deploy
    - ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts

  script:
    - |
      ssh -i ~/.ssh/gitlab_deploy -o IdentitiesOnly=yes $SERVER_USER@$SERVER_HOST 'bash -lc "
        set -e
        cd /home/valik/TobeyMazes
        git pull origin master
        fuser -k 8080/tcp || true
        sleep 2
        nohup /usr/bin/mvn spring-boot:run -Dspring-boot.run.profiles=server > app.log 2>&1 < /dev/null &
      "'