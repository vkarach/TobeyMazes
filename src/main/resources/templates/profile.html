<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="preload" th:href="@{/ui/fxgl/fonts/PressStart2P-Regular.ttf}" as="font" type="font/ttf" crossorigin>
    <link rel="preload" th:href="@{/css/menu.css}"   as="style">
    <link rel="preload" th:href="@{/css/levels.css}" as="style">
    <link rel="preload" th:href="@{/css/game.css}"   as="style">
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/profile.css}">
    <script type="module" src="https://unpkg.com/@hotwired/turbo@8/dist/turbo.es2017-esm.js"></script>
    <script defer th:src="@{/js/scale.js}"></script>
</head>
<body class="on-profile">
<div class="game-root">
    <div class="bg" id="bg-main" data-turbo-permanent>
        <div class="bg-layer" data-speed="12" data-bg="/ui/fxgl/backgrounds/mainMenuParallax/1.png"></div>
        <div class="bg-layer" data-speed="32" data-bg="/ui/fxgl/backgrounds/mainMenuParallax/2.png"></div>
        <div class="bg-layer" data-speed="48" data-bg="/ui/fxgl/backgrounds/mainMenuParallax/3.png"></div>
        <div class="bg-layer" data-speed="80" data-bg="/ui/fxgl/backgrounds/mainMenuParallax/4_with_konek.png"></div>
    </div>
    <div class="bg" id="bg-profile" data-turbo-permanent>
        <div class="bg-layer" data-speed="12" data-bg="/ui/fxgl/backgrounds/profilePageParallax/1.png"></div>
        <div class="bg-layer" data-speed="32" data-bg="/ui/fxgl/backgrounds/profilePageParallax/2.png"></div>
        <div class="bg-layer" data-speed="48" data-bg="/ui/fxgl/backgrounds/profilePageParallax/3.png"></div>
        <div class="bg-layer" data-speed="80" data-bg="/ui/fxgl/backgrounds/profilePageParallax/4.png"></div>
    </div>
    <div class="bg" id="bg-game" data-turbo-permanent>
        <div class="bg-layer" data-speed="12" data-bg="/ui/fxgl/backgrounds/mainMenuParallax/1.png"></div>
        <div class="bg-layer" data-speed="32" data-bg="/ui/fxgl/backgrounds/mainMenuParallax/2.png"></div>
        <div class="bg-layer" data-speed="48" data-bg="/ui/fxgl/backgrounds/mainMenuParallax/3.png"></div>
        <div class="bg-layer" data-speed="80" data-bg="/ui/fxgl/backgrounds/mainMenuParallax/4.png"></div>
    </div>

    <!-- ===== AUTHORIZED ===== -->
    <div th:if="${user != null}">
        <div class="menu-wrap">
            <div class="title-line title-line-1" style="transform:translateX(-50px)">YOUR</div>
            <div class="title-line title-line-2" style="transform:translateX(150px)">PROFILE</div>
            <div class="profile-info">
                <div class="info-text" th:text="${user.name}">username</div>
                <div class="info-text" th:text="'Score: ' + ${overallScore}">Score: 0</div>
            </div>
            <div class="profile-actions">
                <button class="menu-btn" onclick="openChangePassword()">CHANGE PASSWORD</button>
                <button class="menu-btn" onclick="submitLogout()">LOGOUT</button>
                <a th:href="@{/menu}" class="menu-btn">BACK</a>
            </div>
        </div>

        <!-- Change password modal -->
        <div class="modal-overlay" id="cp-modal">
            <div class="modal-box">
                <div class="modal-title" id="cp-title">CHANGE PASSWORD</div>
                <div class="modal-error" id="cp-error"></div>

                <div class="modal-step" id="cp-loading">
                    <p class="modal-hint" id="cp-loading-text">Sending code...</p>
                    <div class="pixel-spinner"></div>
                </div>

                <div class="modal-step" id="cp-step2" style="display:none">
                    <p class="modal-hint">Enter the code from your email</p>
                    <input class="pixel-input" type="number"   id="cp-code"    placeholder="6-digit code"/>
                    <input class="pixel-input" type="password" id="cp-newpass" placeholder="new password"/>
                    <button class="confirm-btn" onclick="submitChangePassword()">CONFIRM</button>
                </div>

                <div class="modal-step" id="cp-success" style="display:none">
                    <p class="modal-hint success-hint">Password changed successfully!</p>
                </div>

                <button class="modal-close" onclick="closeModal('cp-modal')">[ CLOSE ]</button>
            </div>
        </div>
    </div>

    <!-- ===== GUEST ===== -->
    <div th:if="${user == null}">
        <div class="menu-wrap">
            <div class="title-line title-line-1" style="transform:translateX(-50px)">LOGIN</div>
            <div class="title-line title-line-2" style="transform:translateX(50px)">REGISTER</div>
            <div class="profile-content">
                <button class="menu-btn" onclick="openModal('login-modal')">LOGIN</button>
                <button class="menu-btn" onclick="openModal('register-modal')">REGISTER</button>
                <a th:href="@{/menu}" class="menu-btn">BACK</a>
            </div>
        </div>

        <!-- Login modal -->
        <div class="modal-overlay" id="login-modal">
            <div class="modal-box">
                <div class="modal-title">LOGIN</div>
                <div class="modal-error" id="login-error"></div>
                <div class="modal-step">
                    <input class="pixel-input" type="text"     id="login-username" placeholder="username"/>
                    <input class="pixel-input" type="password" id="login-password" placeholder="password"/>
                    <button class="confirm-btn" onclick="submitLogin()">CONFIRM</button>
                </div>
                <button class="modal-close" onclick="closeModal('login-modal')">[ CLOSE ]</button>
            </div>
        </div>

        <!-- Register modal -->
        <div class="modal-overlay" id="register-modal">
            <div class="modal-box">
                <div class="modal-title" id="reg-title">REGISTER</div>
                <div class="modal-error" id="reg-error"></div>

                <div class="modal-step" id="reg-step1">
                    <input class="pixel-input" type="text"     id="reg-username" placeholder="username"/>
                    <input class="pixel-input" type="password" id="reg-password" placeholder="password"/>
                    <input class="pixel-input" type="email"    id="reg-email"    placeholder="email"/>
                    <button class="confirm-btn" onclick="submitRegister()">CONFIRM</button>
                </div>

                <div class="modal-step" id="reg-loading" style="display:none">
                    <p class="modal-hint">Sending code...</p>
                    <div class="pixel-spinner"></div>
                </div>

                <div class="modal-step" id="reg-step2" style="display:none">
                    <p class="modal-hint">Enter the code sent to your email</p>
                    <input class="pixel-input" type="number" id="reg-code" placeholder="6-digit code"/>
                    <button class="confirm-btn" onclick="submitConfirm()">CONFIRM</button>
                </div>

                <button class="modal-close" onclick="closeModal('register-modal')">[ CLOSE ]</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/parallax-shared.js}"></script>
<script th:src="@{/js/transitions.js}"></script>
<script th:src="@{/js/profile.js}"></script>
</body>
</html>
