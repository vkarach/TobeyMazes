<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>

<h1>Profile</h1>

<p th:if="${error}" th:text="${error}" style="color:red;"></p>

<div th:if="${user != null}">
    <p>Logged in as: <strong th:text="${user.name}"></strong></p>
    <a th:href="@{/profile/change-password}">Change Password</a><br/><br/>
    <form method="post" th:action="@{/profile/logout}">
        <button type="submit">Logout</button>
    </form>
</div>

<div th:if="${user == null}">
    <h2>Login</h2>
    <form method="post" th:action="@{/profile/login}">
        <input type="text" name="username" placeholder="Username" required/><br/>
        <input type="password" name="password" placeholder="Password" required/><br/>
        <button type="submit">Login</button>
    </form>

    <h2>Register</h2>
    <form method="post" th:action="@{/profile/register}">
        <input type="text" name="username" placeholder="Username" required/><br/>
        <input type="password" name="password" placeholder="Password" required/><br/>
        <input type="email" name="email" placeholder="Email" required/><br/>
        <button type="submit">Register</button>
    </form>
</div>

<br/><a th:href="@{/menu}">Back to menu</a>

</body>
</html>
