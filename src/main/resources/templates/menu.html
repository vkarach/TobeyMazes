<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Menu — Tobey Mazes</title>
    <meta name="description" content="A maze puzzle game. Your horse, Konek Tobey, slides until he bumps a wall — collect all the flowers and beat your own record.">
    <meta name="keywords" content="tobey mazes, maze, puzzle, browser game, sliding puzzle, student project">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Valentyn Karachevtsev">
    <link rel="canonical" href="https://tobeymazes.xyz/menu">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Tobey Mazes">
    <meta property="og:title" content="Tobey Mazes — a sliding maze puzzle game">
    <meta property="og:description" content="A maze puzzle game. Your horse, Konek Tobey, slides until he bumps a wall — collect all the flowers and beat your own record.">
    <meta property="og:image" content="https://tobeymazes.xyz/img/logos/logo_source.png">
    <meta property="og:url" content="https://tobeymazes.xyz/">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Tobey Mazes — a sliding maze puzzle game">
    <meta name="twitter:description" content="A maze puzzle game. Your horse, Konek Tobey, slides until he bumps a wall — collect all the flowers and beat your own record.">
    <meta name="twitter:image" content="https://tobeymazes.xyz/img/logos/logo_source.png">

    <script type="application/ld+json" th:unless="${reviewCount > 0}">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Tobey Mazes",
      "url": "https://tobeymazes.xyz/",
      "image": "https://tobeymazes.xyz/img/logos/logo_source.png",
      "description": "A maze puzzle game. Your horse, Konek Tobey, slides until he bumps a wall — collect all the flowers and beat your own record.",
      "genre": ["Puzzle", "Maze"],
      "gamePlatform": ["Web Browser"],
      "applicationCategory": "Game",
      "operatingSystem": "Any",
      "author": { "@type": "Person", "name": "Valentyn Karachevtsev" },
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR", "availability": "https://schema.org/InStock" }
    }
    </script>
    <script type="application/ld+json" th:if="${reviewCount > 0}" th:utext="|
    {
      &quot;@context&quot;: &quot;https://schema.org&quot;,
      &quot;@type&quot;: &quot;VideoGame&quot;,
      &quot;name&quot;: &quot;Tobey Mazes&quot;,
      &quot;url&quot;: &quot;https://tobeymazes.xyz/&quot;,
      &quot;image&quot;: &quot;https://tobeymazes.xyz/img/logos/logo_source.png&quot;,
      &quot;description&quot;: &quot;A maze puzzle game. Your horse, Konek Tobey, slides until he bumps a wall — collect all the flowers and beat your own record.&quot;,
      &quot;genre&quot;: [&quot;Puzzle&quot;, &quot;Maze&quot;],
      &quot;gamePlatform&quot;: [&quot;Web Browser&quot;],
      &quot;applicationCategory&quot;: &quot;Game&quot;,
      &quot;operatingSystem&quot;: &quot;Any&quot;,
      &quot;author&quot;: { &quot;@type&quot;: &quot;Person&quot;, &quot;name&quot;: &quot;Valentyn Karachevtsev&quot; },
      &quot;offers&quot;: { &quot;@type&quot;: &quot;Offer&quot;, &quot;price&quot;: &quot;0&quot;, &quot;priceCurrency&quot;: &quot;EUR&quot;, &quot;availability&quot;: &quot;https://schema.org/InStock&quot; },
      &quot;aggregateRating&quot;: { &quot;@type&quot;: &quot;AggregateRating&quot;, &quot;ratingValue&quot;: &quot;${#numbers.formatDecimal(overallRating, 1, 2, 'POINT')}&quot;, &quot;bestRating&quot;: &quot;5&quot;, &quot;worstRating&quot;: &quot;1&quot;, &quot;ratingCount&quot;: &quot;${reviewCount}&quot; }
    }|"></script>

    <link rel="preload" th:href="@{/ui/shared/fonts/PressStart2P-Regular.ttf}" as="font" type="font/ttf" crossorigin>
    <link rel="preload" th:href="@{/css/levels.css}" as="style">
    <link rel="preload" th:href="@{/css/profile.css}" as="style">
    <link rel="preload" th:href="@{/css/game.css}"   as="style">
    <link rel="preload" th:href="@{/js/parallax-shared.js}" as="script">
    <link rel="preload" th:href="@{/js/nav-shared.js}"      as="script">
    <link rel="preload" th:href="@{/js/menu.js}"            as="script">
    <th:block th:replace="~{fragments/bg-preloads :: preloads}"></th:block>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <th:block th:replace="~{fragments/head :: favicon}"></th:block>
    <script type="module" src="https://unpkg.com/@hotwired/turbo@8/dist/turbo.es2017-esm.js"></script>
    <script th:src="@{/js/scale.js}"></script>
</head>
<body class="nav-no-anim kb-mode">

<div class="game-root">
    <th:block th:replace="~{fragments/bg-parallax :: parallax-bg}"></th:block>

    <div class="menu-wrap">
        <div class="title-line title-line-1">TOBEY</div>
        <div class="title-line title-line-2">MAZES</div>

        <a th:href="@{/game/levels}" class="menu-btn">START</a>
        <a th:href="@{/profile}"     class="menu-btn">PROFILE</a>
        <a th:href="@{/leaderboard}" class="menu-btn">LEADERBOARD</a>
        <a th:href="@{/review}"      class="menu-btn">RATE</a>
        <a th:href="@{/about}"       class="menu-btn">ABOUT</a>
    </div>
</div>

<div class="version-tag" th:text="'Beta (late) v' + ${version}">Beta v0.0.0</div>

<script th:src="@{/js/parallax-shared.js}"></script>
<script th:src="@{/js/nav-shared.js}"></script>
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/menu.js}"></script>
</body>
</html>
