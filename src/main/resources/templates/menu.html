<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Menu — Tobey Mazes</title>
    <meta name="robots" content="index, follow">
    <meta name="author" content="Valentyn Karachevtsev">
    <link rel="canonical" href="https://tobeymazes.xyz/">

    <link rel="preload" th:href="@{/ui/shared/fonts/PressStart2P-Regular.ttf}" as="font" type="font/ttf" crossorigin>
    <link rel="preload" th:href="@{/css/levels.css}" as="style">
    <link rel="preload" th:href="@{/css/profile.css}" as="style">
    <link rel="preload" th:href="@{/css/game.css}"   as="style">
    <link rel="preload" th:href="@{/js/parallax-shared.js}" as="script">
    <link rel="preload" th:href="@{/js/nav-shared.js}"      as="script">
    <link rel="preload" th:href="@{/js/menu.js}"            as="script">
    <th:block th:replace="~{fragments/bg-preloads :: preloads}"></th:block>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/menu.css}">
    <th:block th:replace="~{fragments/head :: favicon}"></th:block>
    <script type="module" src="https://unpkg.com/@hotwired/turbo@8/dist/turbo.es2017-esm.js"></script>
    <script th:src="@{/js/scale.js}"></script>
</head>
<body class="nav-no-anim kb-mode">

<div class="game-root">
    <th:block th:replace="~{fragments/bg-parallax :: parallax-bg}"></th:block>

    <div class="menu-wrap">
        <div class="title-line title-line-1">TOBEY</div>
        <div class="title-line title-line-2">MAZES</div>

        <a th:href="@{/game/levels}" class="menu-btn">START</a>
        <a th:href="@{/profile}"     class="menu-btn">PROFILE</a>
        <a th:href="@{/leaderboard}" class="menu-btn">LEADERBOARD</a>
        <a th:href="@{/review}"      class="menu-btn">RATE</a>
        <a th:href="@{/about}"       class="menu-btn">ABOUT</a>
        <a th:href="@{/}"            class="menu-btn menu-btn-exit" data-turbo="false">EXIT</a>
    </div>
</div>

<div class="version-tag" th:text="${versionLabel} + ${version}">Beta v0.0.0</div>

<script th:src="@{/js/parallax-shared.js}"></script>
<script th:src="@{/js/nav-shared.js}"></script>
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/menu.js}"></script>
</body>
</html>
