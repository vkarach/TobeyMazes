<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Email</title>
</head>
<body>

<h1>Email Confirmation</h1>

<p>A 6-digit code was sent to <strong th:text="${email}"></strong></p>

<p th:if="${error}" th:text="${error}" style="color:red;"></p>

<form method="post" th:action="@{/profile/confirm}">
    <input type="hidden" name="username" th:value="${username}"/>
    <input type="hidden" name="password" th:value="${password}"/>
    <input type="hidden" name="email" th:value="${email}"/>
    <input type="number" name="userCode" placeholder="Enter 6-digit code" required/><br/>
    <button type="submit">Confirm</button>
</form>

<br/><a th:href="@{/profile}">Back to profile</a>

</body>
</html>
