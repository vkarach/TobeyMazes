<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Select Level - TobeyMazes</title>
  <link rel="preload" th:href="@{/ui/shared/fonts/PressStart2P-Regular.ttf}" as="font" type="font/ttf" crossorigin>
  <link rel="preload" th:href="@{/css/menu.css}"    as="style">
  <link rel="preload" th:href="@{/css/profile.css}" as="style">
  <link rel="preload" th:href="@{/css/game.css}"    as="style">
  <link rel="preload" th:href="@{/js/parallax-shared.js}" as="script">
  <link rel="preload" th:href="@{/js/levels.js}"          as="script">
  <th:block th:replace="~{fragments/bg-preloads :: preloads}"></th:block>
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/levels.css}">
  <link rel="icon" class="icon" type="image/png" th:href="@{/img/logo.png}">
  <script type="module" src="https://unpkg.com/@hotwired/turbo@8/dist/turbo.es2017-esm.js"></script>
  <script defer th:src="@{/js/scale.js}"></script>
</head>
<body class="nav-no-anim kb-mode" th:attr="data-user-id=${currentUserId}">

<div class="game-root">
<th:block th:replace="~{fragments/bg-parallax :: parallax-bg}"></th:block>

<div class="page">
  <div class="page-title">SELECT LEVEL</div>

  <div class="level-grid">
    <div th:each="level : ${levels}">
      <form method="post" th:action="@{/game/start}">
        <input type="hidden" name="levelId" th:value="${level.id}"/>
        <button type="button"
                class="level-card"
                th:classappend="'diff-' + ${level.difficulty}"
                th:attr="data-level-id=${level.id},
                         data-level-title=${level.title},
                         data-level-difficulty=${level.difficulty}">
          <div class="card-number" th:text="'#' + ${level.id}"></div>
          <div class="card-title"  th:text="${level.title}"></div>
          <div class="card-diff"   th:text="${level.difficulty}"></div>
        </button>
        <button type="submit" class="hidden-submit" aria-hidden="true" tabindex="-1"></button>
      </form>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div id="level-modal" class="level-modal">
      <div class="level-modal-body">
        <img src="" alt="Level preview" id="level-preview" class="level-preview">

        <div class="level-modal-right">
          <div class="level-modal-header">
            <div id="info-label" class="info-label"></div>
            <div id="modal-difficulty" class="info-diff"></div>
          </div>

          <div class="lm-separator"></div>

          <div class="level-modal-stats">
            <div class="modal-stat">
              <span class="modal-stat-label">BEST TIME</span>
              <span class="modal-stat-value" id="modal-time">—</span>
            </div>
            <div class="modal-stat">
              <span class="modal-stat-label">BEST SCORE</span>
              <span class="modal-stat-value" id="modal-score">—</span>
            </div>
          </div>

          <div class="lm-separator"></div>

          <div class="level-modal-actions">
            <button id="modal-back-btn" class="lm-nav nav-btn lm-btn lm-btn-dim">BACK</button>
            <button id="modal-start-btn" class="lm-nav nav-btn lm-btn">START</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <a th:href="@{/menu}" class="back-link">
    <span class="key">[ESC]</span> Back to Menu
  </a>
</div>

<script th:src="@{/js/parallax-shared.js}"></script>
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/levels.js}"></script>
</div><!-- .game-root -->

</body>
</html>
