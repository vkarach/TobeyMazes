<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title th:text="${levelTitle}">TobeyMazes</title>
  <link rel="preload" th:href="@{/ui/shared/fonts/PressStart2P-Regular.ttf}" as="font" type="font/ttf" crossorigin>
  <link rel="preload" th:href="@{/css/menu.css}"    as="style">
  <link rel="preload" th:href="@{/css/levels.css}"  as="style">
  <link rel="preload" th:href="@{/css/profile.css}" as="style">
  <link rel="preload" th:href="@{/js/parallax-shared.js}" as="script">
  <link rel="preload" th:href="@{/js/game.js}"            as="script">
  <th:block th:replace="~{fragments/bg-preloads :: preloads}"></th:block>
  <link rel="stylesheet" th:href="@{/css/base.css}">
  <link rel="stylesheet" th:href="@{/css/game.css}">
  <th:block th:replace="~{fragments/head :: favicon}"></th:block>
  <script type="module" src="https://unpkg.com/@hotwired/turbo@8/dist/turbo.es2017-esm.js"></script>
  <script th:src="@{/js/scale.js}"></script>
</head>
<body class="on-game nav-no-anim kb-mode" th:attr="data-user-id=${currentUserId}">

<div class="game-root">

<th:block th:replace="~{fragments/bg-parallax :: parallax-bg}"></th:block>

<!-- Win overlay (hidden until win) -->
<div id="win-overlay">
  <div class="win-burst"></div>
  <div class="win-title">YOU WIN!</div>
  <div class="win-stats">
    <div class="win-stat">
      <div class="win-stat-label">TIME</div>
      <div class="win-stat-value" id="win-time">-</div>
      <div class="win-improve" id="win-time-improve"></div>
    </div>
    <div class="win-stat">
      <div class="win-stat-label">SCORE</div>
      <div class="win-stat-value" id="win-score">-</div>
      <div class="win-improve" id="win-score-improve"></div>
    </div>
  </div>
  <!-- Guest hint: only shown for visitors without an account -->
  <div class="win-guest-hint" id="win-guest-hint" th:if="${currentUserId == null}">
    <div class="win-guest-line">
      <a th:href="@{/profile}" class="win-guest-link">Sign in</a> to save your records
    </div>
    <div class="win-guest-line">and climb the leaderboard</div>
  </div>
  <div class="win-actions">
    <a th:href="@{/game/levels}" class="win-nav win-btn">LEVELS</a>
    <a th:href="@{/game}" class="win-nav win-btn" id="win-replay">PLAY AGAIN</a>
  </div>
</div>

<!-- Game page -->
<div class="page">
  <div class="game-area">

    <div class="maze-wrap">
      <div class="level-title" th:text="${levelTitle}">Level</div>

      <div class="maze-panel">
        <div class="maze-grid" id="maze-grid">
          <canvas id="maze-canvas"></canvas>
          <div class="maze-row" th:each="row, rStat : ${cells}">
            <div th:each="cell, cStat : ${row}"
                 class="cell"
                 th:classappend="(${cell.top}    ? ' wall-top'    : '') +
                                 (${cell.bottom} ? ' wall-bottom' : '') +
                                 (${cell.left}   ? ' wall-left'   : '') +
                                 (${cell.right}  ? ' wall-right'  : '')">
              <div th:if="${cell.content == 'T'}"
                   class="target-gem"
                   th:id="'target-' + ${rStat.index} + '-' + ${cStat.index}"></div>
            </div>
          </div>

          <div id="player"
               th:style="'top:' + ${playerY * 56} + 'px; left:' + ${playerX * 56} + 'px'">
          </div>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">

      <!-- HUD -->
      <div class="hud">
        <div class="hud-row">
          <div class="hud-label">TIME</div>
          <div class="hud-value" id="timer">0:00</div>
        </div>
        <div class="hud-row">
          <div class="hud-label">STEPS</div>
          <div class="hud-value" id="step-count" th:text="${stepCount}">0</div>
        </div>
        <div class="hud-row">
          <div class="hud-label">TARGETS</div>
          <div class="hud-value blue" id="targets-left">-</div>
        </div>
      </div>

      <!-- Arrow buttons -->
      <div class="controls">
        <div class="ctrl-row">
          <div class="ctrl-spacer"></div>
          <button class="ctrl-btn" onclick="sendMove('UP')" title="Up (↑)">▲</button>
          <div class="ctrl-spacer"></div>
        </div>
        <div class="ctrl-row">
          <button class="ctrl-btn" onclick="sendMove('LEFT')"  title="Left (←)">◀</button>
          <button class="ctrl-btn" onclick="sendMove('DOWN')"  title="Down (↓)">▼</button>
          <button class="ctrl-btn" onclick="sendMove('RIGHT')" title="Right (→)">▶</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <a th:href="@{/game}" class="action-link"><span class="key">[R]</span> Restart</a>
    <div class="bar-sep"></div>
    <a th:href="@{/game/levels}" class="action-link"><span class="key">[Q]</span> Levels</a>
    <div class="bar-sep"></div>
    <a th:href="@{/menu}" class="action-link"><span class="key">[M]</span> Menu</a>
  </div>

</div>

<script th:inline="javascript">
  window.GAME_INIT = {
    playerX:     /*[[${playerX}]]*/     0,
    playerY:     /*[[${playerY}]]*/     0,
    gameWon:     /*[[${gameWon}]]*/     false,
    lastTimeMs:  /*[[${lastTimeMs}]]*/  null,
    lastScore:   /*[[${lastScore}]]*/   null,
    timeRecord:  /*[[${timeRecord}]]*/  false,
    scoreRecord: /*[[${scoreRecord}]]*/ false,
    difficulty:  /*[[${difficulty}]]*/  'EASY'
  };
</script>
<script th:src="@{/js/parallax-shared.js}"></script>
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/game.js}"></script>
</div><!-- .game-root -->

</body>
</html>
